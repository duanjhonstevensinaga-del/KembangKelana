<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist Saya — Kisah Anda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0ede4;
            color: #222225;
            min-height: 100vh;
        }

        /* ── TOP NAV ── */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: #fff;
            border-bottom: 1px solid #ece8de;
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: #222225;
            text-decoration: none; background: #f5f0e4;
            border-radius: 20px; padding: 6px 14px; transition: background 0.2s;
        }
        .back-btn:hover { background: #ece8de; }
        .nav-title {
            font-size: 16px; font-weight: 900;
            font-family: 'Playfair Display', serif; color: #222225;
        }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .nav-login-btn {
            font-size: 12px; font-weight: 700;
            padding: 6px 14px; border-radius: 20px;
            background: #222225; color: #fff; border: none; cursor: pointer;
            transition: background 0.2s;
        }
        .nav-login-btn:hover { background: #444; }
        .nav-user-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: #75a9b3; color: #fff;
            font-size: 12px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        /* ── PAGE ── */
        .page-content {
            max-width: 780px; margin: 0 auto;
            padding: 28px 20px 60px;
        }

        .page-header { margin-bottom: 24px; }
        .page-header h1 {
            font-size: 32px; font-weight: 900;
            font-family: 'Playfair Display', serif;
        }
        .page-header p { font-size: 13px; color: #aaa; margin-top: 4px; }

        /* Auth wall */
        .auth-wall {
            background: #fff;
            border-radius: 20px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .auth-wall-icon { font-size: 48px; margin-bottom: 12px; }
        .auth-wall h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
        .auth-wall p { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .auth-wall-btn {
            padding: 10px 28px; border-radius: 20px;
            background: #222225; color: #fff; border: none;
            font-size: 14px; font-weight: 700;
            cursor: pointer; margin: 0 6px; transition: background 0.2s;
        }
        .auth-wall-btn:hover { background: #444; }
        .auth-wall-btn.outline {
            background: #fff; color: #222225;
            border: 1.5px solid #ddd;
        }
        .auth-wall-btn.outline:hover { background: #f5f0e4; }

        /* Empty wishlist */
        .empty-wishlist {
            background: #fff; border-radius: 20px;
            padding: 48px 32px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .empty-wishlist-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-wishlist h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
        .empty-wishlist p  { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .explore-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 24px; border-radius: 20px;
            background: #75a9b3; color: #fff; border: none;
            font-size: 13px; font-weight: 700;
            text-decoration: none; cursor: pointer;
            transition: background 0.2s;
        }
        .explore-btn:hover { background: #5e98a2; }

        /* Wishlist grid */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        /* Wishlist card */
        .wish-card {
            background: #faf7ee;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .wish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.10);
        }
        .wish-img-wrap {
            position: relative;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }
        .wish-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            transition: transform 0.3s;
        }
        .wish-card:hover .wish-img-wrap img { transform: scale(1.04); }
        .wish-cat-badge {
            position: absolute; top: 8px; left: 8px;
            font-size: 10px; font-weight: 700;
            background: rgba(255,255,255,0.88);
            color: #75a9b3; padding: 3px 10px;
            border-radius: 20px; backdrop-filter: blur(4px);
        }
        .wish-remove-btn {
            position: absolute; top: 8px; right: 8px;
            width: 28px; height: 28px;
            background: rgba(255,255,255,0.88);
            border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(4px);
            transition: background 0.2s; z-index: 2;
        }
        .wish-remove-btn:hover { background: #ffe0e0; }
        .wish-remove-btn svg { width: 14px; height: 14px; color: #e05a5a; }
        .wish-info { padding: 10px 12px 12px; }
        .wish-name { font-size: 13px; font-weight: 800; color: #222225; margin-bottom: 4px; }
        .wish-cost { font-size: 11px; font-weight: 600; color: #75a9b3; }
        .wish-loading {
            grid-column: 1/-1; text-align: center;
            padding: 40px; color: #aaa; font-size: 13px;
        }

        /* Stats bar */
        .wishlist-stats {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
        }
        .wishlist-count { font-size: 13px; color: #888; font-weight: 600; }
        .clear-all-btn {
            font-size: 12px; font-weight: 700;
            color: #e05a5a; background: #ffe0e0;
            border: none; border-radius: 20px;
            padding: 5px 14px; cursor: pointer;
            transition: background 0.2s;
        }
        .clear-all-btn:hover { background: #ffcdd2; }

        /* Toast */
        .toast-wish {
            position: fixed; bottom: 28px;
            left: 50%; transform: translateX(-50%) translateY(20px);
            background: #222225; color: #fff;
            font-size: 13px; font-weight: 600;
            padding: 10px 22px; border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 2000; white-space: nowrap;
        }
        .toast-wish.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-wish.success { background: #1a7a3c; }

        /* Auth Modal (same as destinasi) */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 1000;
            align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(3px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff; border-radius: 20px;
            padding: 28px 28px 24px; width: 100%; max-width: 420px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .auth-tabs { display: flex; gap: 4px; background: #f0ede4; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 8px 0; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; background: transparent; color: #aaa; transition: background 0.2s, color 0.2s; }
        .auth-tab.active { background: #fff; color: #222225; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .modal-title { font-size: 20px; font-weight: 900; color: #222225; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
        .modal-sub { font-size: 13px; color: #888; margin-bottom: 18px; }
        .modal-msg { font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; display: none; }
        .modal-msg.error   { background: #ffe0e0; color: #c0392b; display: block; }
        .modal-msg.success { background: #e0f5e9; color: #1a7a3c; display: block; }
        .modal-form { display: flex; flex-direction: column; gap: 12px; }
        .modal-row  { display: flex; gap: 12px; }
        .modal-row .modal-group { flex: 1; }
        .modal-group { display: flex; flex-direction: column; gap: 5px; }
        .modal-label { font-size: 12px; font-weight: 700; color: #555; }
        .modal-input { padding: 9px 12px; border: 1.5px solid #e0d9cc; border-radius: 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #222225; background: #faf7ee; outline: none; width: 100%; transition: border-color 0.2s; }
        .modal-input:focus { border-color: #75a9b3; box-shadow: 0 0 0 3px rgba(117,169,179,0.15); }
        .pwd-wrap { position: relative; }
        .pwd-wrap .modal-input { padding-right: 40px; }
        .pwd-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 15px; opacity: 0.5; transition: opacity 0.2s; }
        .pwd-toggle:hover { opacity: 1; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
        .modal-cancel { padding: 9px 20px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; }
        .modal-cancel:hover { background: #f5f0e4; }
        .modal-submit { padding: 9px 22px; border-radius: 20px; border: none; background: #222225; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; transition: background 0.2s; }
        .modal-submit:hover { background: #444; }
        .modal-submit:disabled { background: #aaa; cursor: not-allowed; }
        .auth-switch-hint { text-align: center; font-size: 12px; color: #aaa; margin-top: 10px; }
        .auth-switch-hint span { color: #75a9b3; font-weight: 700; cursor: pointer; text-decoration: underline; }

        @media (max-width: 560px) {
            .wishlist-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="top-nav">
    <a href="index.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Beranda
    </a>
    <span class="nav-title">Wishlist Saya ❤️</span>
    <div class="nav-right" id="navAuthArea"><!-- filled by JS --></div>
</nav>

<!-- ── PAGE CONTENT ── -->
<div class="page-content">
    <div class="page-header">
        <h1>Wishlist Kamu</h1>
        <p id="wishlistSubtitle">Destinasi favorit yang ingin kamu kunjungi</p>
    </div>
    <div id="wishlistContainer"></div>
</div>

<!-- ── TOAST ── -->
<div class="toast-wish" id="toastWish"></div>

<!-- ══ AUTH MODAL ══ -->
<div class="modal-overlay" id="authModal">
    <div class="modal-box">
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Masuk</button>
            <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Daftar</button>
        </div>
        <div id="panelLogin">
            <div class="modal-title">👋 Selamat Datang!</div>
            <p class="modal-sub">Masuk untuk melihat & mengelola wishlist kamu.</p>
            <div class="modal-msg" id="loginMsg"></div>
            <div class="modal-form">
                <div class="modal-group"><label class="modal-label">Email</label><input type="email" class="modal-input" id="loginEmail" placeholder="email@kamu.com" /></div>
                <div class="modal-group"><label class="modal-label">Password</label><div class="pwd-wrap"><input type="password" class="modal-input" id="loginPassword" placeholder="Password..." /><button type="button" class="pwd-toggle" onclick="togglePwd('loginPassword',this)">👁</button></div></div>
                <div class="modal-actions">
                    <button class="modal-cancel" onclick="closeAuthModal()">Batal</button>
                    <button class="modal-submit" id="btnLogin" onclick="doLogin()">Masuk</button>
                </div>
                <p class="auth-switch-hint">Belum punya akun? <span onclick="switchAuthTab('register')">Daftar sekarang</span></p>
            </div>
        </div>
        <div id="panelRegister" style="display:none">
            <div class="modal-title">✨ Buat Akun Baru</div>
            <p class="modal-sub">Daftar gratis untuk menyimpan wishlist destinasi kamu.</p>
            <div class="modal-msg" id="registerMsg"></div>
            <div class="modal-form">
                <div class="modal-row">
                    <div class="modal-group"><label class="modal-label">Nama Lengkap *</label><input type="text" class="modal-input" id="regName" placeholder="Nama kamu" /></div>
                    <div class="modal-group"><label class="modal-label">Username</label><input type="text" class="modal-input" id="regUsername" placeholder="username" /></div>
                </div>
                <div class="modal-group"><label class="modal-label">Email *</label><input type="email" class="modal-input" id="regEmail" placeholder="email@kamu.com" /></div>
                <div class="modal-group"><label class="modal-label">Password *</label><div class="pwd-wrap"><input type="password" class="modal-input" id="regPassword" placeholder="Min. 6 karakter" /><button type="button" class="pwd-toggle" onclick="togglePwd('regPassword',this)">👁</button></div></div>
                <div class="modal-group"><label class="modal-label">Konfirmasi Password *</label><div class="pwd-wrap"><input type="password" class="modal-input" id="regPasswordConfirm" placeholder="Ulangi password" /><button type="button" class="pwd-toggle" onclick="togglePwd('regPasswordConfirm',this)">👁</button></div></div>
                <div class="modal-actions">
                    <button class="modal-cancel" onclick="closeAuthModal()">Batal</button>
                    <button class="modal-submit" id="btnRegister" onclick="doRegister()">Buat Akun</button>
                </div>
                <p class="auth-switch-hint">Sudah punya akun? <span onclick="switchAuthTab('login')">Masuk</span></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ── SUPABASE ── */
const SUPABASE_URL = "https://fvyjlwwurapxbddakdpq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eWpsd3d1cmFweGJkZGFrZHBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjkxMjUsImV4cCI6MjA5NDY0NTEyNX0.76JVhpxtplY4B0dY7VhBmh2XP_Mzooi84yPA6-vNtb0";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

function escHTML(s='') {
    return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]||c));
}
function showToast(msg, type='') {
    const el = document.getElementById('toastWish');
    el.textContent = msg; el.className = `toast-wish show ${type}`;
    clearTimeout(el._t); el._t = setTimeout(() => el.className='toast-wish', 3000);
}
function setMsg(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return; el.textContent = msg; el.className = `modal-msg ${type}`;
}
function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const t = inp.type === 'text'; inp.type = t ? 'password' : 'text';
    btn.textContent = t ? '👁' : '🙈';
}

/* ── AUTH MODAL ── */
function openAuthModal(tab='login') {
    document.getElementById('authModal').classList.add('open');
    switchAuthTab(tab);
}
function closeAuthModal() {
    document.getElementById('authModal').classList.remove('open');
}
function switchAuthTab(tab) {
    document.getElementById('panelLogin').style.display    = tab==='login'    ? '':'none';
    document.getElementById('panelRegister').style.display = tab==='register' ? '':'none';
    document.getElementById('tabLogin').classList.toggle('active', tab==='login');
    document.getElementById('tabRegister').classList.toggle('active', tab==='register');
}

async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd   = document.getElementById('loginPassword').value;
    const btn   = document.getElementById('btnLogin');
    if (!email||!pwd) { setMsg('loginMsg','Isi email dan password!','error'); return; }
    btn.disabled=true; btn.textContent='Masuk...';
    const {data,error} = await sb.auth.signInWithPassword({email, password:pwd});
    btn.disabled=false; btn.textContent='Masuk';
    if (error) { setMsg('loginMsg','Login gagal: '+error.message,'error'); return; }
    currentUser = data.user;
    closeAuthModal();
    renderNav();
    await renderWishlist();
    const name = currentUser.user_metadata?.full_name || email.split('@')[0];
    showToast(`Halo ${name}! Wishlist kamu siap. 👋`, 'success');
}

async function doRegister() {
    const name  = document.getElementById('regName').value.trim();
    const user  = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pwd   = document.getElementById('regPassword').value;
    const pwdc  = document.getElementById('regPasswordConfirm').value;
    const btn   = document.getElementById('btnRegister');
    if (!name||!email||!pwd) { setMsg('registerMsg','Nama, email, password wajib!','error'); return; }
    if (pwd.length<6)        { setMsg('registerMsg','Password min 6 karakter.','error'); return; }
    if (pwd!==pwdc)          { setMsg('registerMsg','Password tidak sama!','error'); return; }
    btn.disabled=true; btn.textContent='Mendaftar...';
    const {data,error} = await sb.auth.signUp({ email, password:pwd, options:{ data:{ full_name:name, username:user||null, role:'user' } } });
    btn.disabled=false; btn.textContent='Buat Akun';
    if (error) { setMsg('registerMsg','Daftar gagal: '+error.message,'error'); return; }
    if (data.user && data.session) {
        currentUser = data.user; closeAuthModal(); renderNav(); await renderWishlist();
        showToast(`Akun dibuat! Halo ${name} 🎉`,'success');
    } else {
        setMsg('registerMsg',`Cek email ${email} untuk konfirmasi.`,'success');
    }
}

/* ── NAV ── */
function renderNav() {
    const area = document.getElementById('navAuthArea');
    if (!currentUser) {
        area.innerHTML = `<button class="nav-login-btn" onclick="openAuthModal()">Masuk / Daftar</button>`;
        return;
    }
    const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
    const ini  = name.slice(0,2).toUpperCase();
    area.innerHTML = `
        <div class="nav-user-avatar" title="${escHTML(name)}">${ini}</div>
        <button class="nav-login-btn" style="background:#ffe0e0;color:#c0392b;" onclick="doLogout()">Keluar</button>`;
}

async function doLogout() {
    await sb.auth.signOut();
    currentUser = null; renderNav(); renderWishlist();
    showToast('Berhasil keluar 👋');
}

/* ── WISHLIST RENDER ── */
const catColors = { cozy:'#a374ff', nature:'#3CB371', culinary:'#E67E22', cultural:'#3498DB' };

async function renderWishlist() {
    const container = document.getElementById('wishlistContainer');
    const subtitle  = document.getElementById('wishlistSubtitle');

    if (!currentUser) {
        container.innerHTML = `
            <div class="auth-wall">
                <div class="auth-wall-icon">🔒</div>
                <h2>Masuk untuk Melihat Wishlist</h2>
                <p>Login atau buat akun gratis untuk menyimpan & melihat wishlist destinasi kamu.</p>
                <button class="auth-wall-btn" onclick="openAuthModal('login')">Masuk</button>
                <button class="auth-wall-btn outline" onclick="openAuthModal('register')">Daftar Gratis</button>
            </div>`;
        subtitle.textContent = 'Login untuk melihat wishlist kamu';
        return;
    }

    container.innerHTML = `<div class="wishlist-grid"><p class="wish-loading">⏳ Memuat wishlist...</p></div>`;

    // Fetch wishlist IDs
    const { data: wishData, error: wishErr } = await sb
        .from('wishlists').select('dest_id').eq('user_id', currentUser.id);

    if (wishErr || !wishData || wishData.length === 0) {
        container.innerHTML = `
            <div class="empty-wishlist">
                <div class="empty-wishlist-icon">💔</div>
                <h2>Wishlist Masih Kosong</h2>
                <p>Jelajahi destinasi Bandung dan tekan ❤️ untuk menyimpan ke wishlist kamu.</p>
                <a href="destinasi.html" class="explore-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    Jelajahi Destinasi
                </a>
            </div>`;
        subtitle.textContent = 'Belum ada destinasi tersimpan';
        return;
    }

    const destIds = wishData.map(w => w.dest_id);
    subtitle.textContent = `${destIds.length} destinasi tersimpan`;

    // Fetch destination details from DB
    const { data: destinations } = await sb
        .from('destinations').select('*').in('id', destIds);

    // Merge — some dest may only be in HTML (not in DB yet), show minimal card
    const destMap = {};
    (destinations || []).forEach(d => { destMap[d.id] = d; });

    const grid = document.createElement('div');

    // Stats bar
    const statsBar = document.createElement('div');
    statsBar.className = 'wishlist-stats';
    statsBar.innerHTML = `
        <span class="wishlist-count">${destIds.length} destinasi tersimpan</span>
        <button class="clear-all-btn" onclick="clearAllWishlist()">Hapus Semua</button>`;
    container.innerHTML = '';
    container.appendChild(statsBar);

    grid.className = 'wishlist-grid';
    destIds.forEach(id => {
        const d = destMap[id];
        const name  = d?.name    || id.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        const cat   = d?.category|| '';
        const cost  = d?.cost    || 0;
        const img   = d?.img_url || '';
        const costFmt = cost > 0 ? `Rp ${Number(cost).toLocaleString('id-ID')}` : 'Gratis';
        const catLower = cat.toLowerCase();
        const catColor = catColors[catLower] || '#75a9b3';

        const card = document.createElement('div');
        card.className = 'wish-card';
        card.innerHTML = `
            <div class="wish-img-wrap">
                <img src="${escHTML(img)||`https://placehold.co/200x140/${catColor.replace('#','')}/fff?text=${encodeURIComponent(name)}`}"
                     alt="${escHTML(name)}"
                     onerror="this.src='https://placehold.co/200x140/ccc/fff?text=${encodeURIComponent(name)}'" />
                ${cat ? `<span class="wish-cat-badge" style="color:${catColor}">${escHTML(cat)}</span>` : ''}
                <button class="wish-remove-btn" title="Hapus dari wishlist" onclick="removeFromWishlist(event,'${id}')">
                    <svg viewBox="0 0 24 24" fill="#e05a5a" stroke="#e05a5a" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                </button>
            </div>
            <div class="wish-info">
                <div class="wish-name">${escHTML(name)}</div>
                <div class="wish-cost">${costFmt}</div>
            </div>`;
        card.addEventListener('click', (e) => {
            if (e.target.closest('.wish-remove-btn')) return;
            window.location.href = `detaildestinasi.html?id=${id}`;
        });
        grid.appendChild(card);
    });

    container.appendChild(grid);
}

async function removeFromWishlist(e, destId) {
    e.stopPropagation();
    if (!currentUser) return;
    await sb.from('wishlists').delete().eq('user_id', currentUser.id).eq('dest_id', destId);
    showToast('Dihapus dari wishlist', '');
    await renderWishlist();
}

async function clearAllWishlist() {
    if (!currentUser) return;
    if (!confirm('Hapus semua wishlist? Tindakan ini tidak bisa dibatalkan.')) return;
    await sb.from('wishlists').delete().eq('user_id', currentUser.id);
    showToast('Semua wishlist dihapus', '');
    await renderWishlist();
}

/* ── INIT ── */
(async () => {
    const { data:{ session } } = await sb.auth.getSession();
    if (session?.user) currentUser = session.user;
    renderNav();
    await renderWishlist();
})();
</script>
