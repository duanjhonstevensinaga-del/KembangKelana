<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Kisah Anda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4e9f0 50%, #c8e0eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        /* ── LOGO ── */
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo img {
            height: 56px;
            width: auto;
        }
        .auth-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: #2c6e7a;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* ── CARD ── */
        .auth-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 8px 40px rgba(44,110,122,0.12);
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* ── TABS ── */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: #f0f7f9;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #7a9da5;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .auth-tab.active {
            background: #2c6e7a;
            color: #fff;
            box-shadow: 0 2px 8px rgba(44,110,122,0.3);
        }

        /* ── FORM ── */
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form.hidden { display: none; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #4a6e78;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 11px 14px;
            border: 1.5px solid #d8edf2;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #1a3a40;
            background: #f8fcfd;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: #2c6e7a;
            box-shadow: 0 0 0 3px rgba(44,110,122,0.1);
            background: #fff;
        }

        .auth-btn {
            padding: 13px;
            background: #2c6e7a;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .auth-btn:hover { background: #1e5460; }
        .auth-btn:active { transform: scale(0.98); }
        .auth-btn:disabled { background: #a0c4cc; cursor: not-allowed; }

        /* ── MESSAGES ── */
        .auth-msg {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .auth-msg.show { display: block; }
        .auth-msg.error   { background: #fde8e8; color: #c0392b; border: 1px solid #f5c0c0; }
        .auth-msg.success { background: #e8f8f0; color: #1e7e4e; border: 1px solid #b0e0c8; }

        /* ── DIVIDER ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #9abcc4;
            font-size: 12px;
            margin: 4px 0;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #d8edf2;
        }

        /* ── BACK LINK ── */
        .auth-back {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #7a9da5;
        }
        .auth-back a {
            color: #2c6e7a;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-back a:hover { text-decoration: underline; }

        /* ── ADMIN BADGE ── */
        .admin-note {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border: 1px solid #ffcc80;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #795548;
            line-height: 1.5;
        }
        .admin-note strong { color: #e65100; }

        /* ── SUCCESS STATE ── */
        .auth-success-state {
            text-align: center;
            padding: 20px 0;
            display: none;
        }
        .auth-success-state.show { display: block; }
        .success-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #2c6e7a;
            margin-bottom: 8px;
        }
        .success-sub {
            font-size: 13px;
            color: #7a9da5;
            margin-bottom: 20px;
        }
        .go-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #2c6e7a;
            color: #fff;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .go-btn:hover { background: #1e5460; }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
        <img src="Simple KS Letter Logo (Kisah Anda) (2).svg" alt="Kisah Anda"
             onerror="this.style.display='none'" />
        <div class="auth-logo-text">Kisah Anda</div>
    </div>

    <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin"    onclick="switchTab('login')">Masuk</div>
            <div class="auth-tab"        id="tabRegister" onclick="switchTab('register')">Daftar</div>
        </div>

        <!-- Message box -->
        <div class="auth-msg" id="authMsg"></div>

        <!-- SUCCESS STATE (after registration) -->
        <div class="auth-success-state" id="successState">
            <div class="success-icon">✅</div>
            <div class="success-title">Akun Berhasil Dibuat!</div>
            <div class="success-sub" id="successSubtext">Cek email kamu untuk verifikasi, lalu masuk ke akun.</div>
            <a href="destinasi.html" class="go-btn">Ke Halaman Destinasi</a>
        </div>

        <!-- ── LOGIN FORM ── -->
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="email@kamu.com" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Masukkan password..." required autocomplete="current-password" />
            </div>
            <button type="submit" class="auth-btn" id="btnLogin">Masuk</button>
            <div class="auth-divider">atau</div>
            <div class="admin-note">
                <strong>🔐 Admin?</strong> Masuk dengan akun admin untuk mengelola destinasi.<br>
                Hubungi pengelola untuk mendapatkan akses admin.
            </div>
        </form>

        <!-- ── REGISTER FORM ── -->
        <form class="auth-form hidden" id="registerForm">
            <div class="form-group">
                <label for="regName">Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Nama kamu..." required />
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="email@kamu.com" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Min. 6 karakter..." required autocomplete="new-password" minlength="6" />
            </div>
            <div class="form-group">
                <label for="regPasswordConfirm">Konfirmasi Password</label>
                <input type="password" id="regPasswordConfirm" placeholder="Ulangi password..." required autocomplete="new-password" />
            </div>
            <button type="submit" class="auth-btn" id="btnRegister">Buat Akun</button>
        </form>
    </div>

    <div class="auth-back">
        <a href="index.html">← Kembali ke Beranda</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</body>
</html>
